
navigation:
  # 목적지에서 이 거리(m) 이내로 들어오면 자동 종료됩니다.
  auto-stop-distance: 2.0

  # 매 틱 유지보수할 최대 내비게이션 세션 수입니다.
  # 1000명 기준 250이면 전체 세션을 약 4틱마다 한 번씩 확인합니다.
  session-checks-per-tick: 250

  # 매 틱 실행할 최대 A* 계산 수입니다. 높을수록 반응은 빠르지만 순간 TPS 부하가 커집니다.
  max-pathfinds-per-tick: 3

  # ItemDisplay 방향 표시 업데이트 주기입니다.
  render-interval-ticks: 4

  # 경로 재계산 주기(틱). 많은 인원이 있는 서버에서는 너무 낮게 잡지 않는 것이 좋습니다.
  repath-interval-ticks: 80

  # 플레이어가 이 거리(m) 이상 이동했을 때 경로를 다시 계산합니다.
  repath-move-threshold: 3.0

  # 경로를 찾지 못했을 때 메시지를 다시 보낼 최소 간격입니다.
  path-not-found-cooldown-ticks: 100

  # A* 탐색에서 허용하는 최대 노드 수입니다. 큰 미로일수록 높게 잡아야 합니다.
  max-search-nodes: 200000

  # 한 칸 위로 올라갈 수 있는 최대 높이입니다.
  max-step-height: 1

  # 아래로 떨어질 수 있는 최대 높이입니다.
  max-drop-height: 3

  # 시작 좌표가 정확히 걷는 칸이 아닐 때 주변에서 걷기 가능한 칸을 찾는 반경입니다.
  start-search-radius: 2

  # 목적지 좌표 주변에서 걷기 가능한 칸을 목표 후보로 찾는 반경입니다.
  # 아머스탠드, NPC, 장식 블록처럼 정확한 좌표가 막혀 있어도 주변 길로 안내합니다.
  goal-search-radius: 6

  # 시작/목적지 후보를 찾을 때 위아래로 확인할 높이입니다.
  vertical-search-range: 4

display:
  # 방향 안내에 사용할 ItemDisplay 아이템입니다.
  item: ARROW

  # 리소스팩 커스텀 모델을 쓸 때만 1 이상으로 설정합니다.
  custom-model-data: 0

  # 아이템이 표시되는 높이 오프셋입니다. 플레이어 발 위치 기준입니다.
  height-offset: 0.12

  # 아이템을 플레이어 앞 몇 블록 지점에 띄울지 설정합니다.
  distance: 2.25

  # 현재 위치에서 이 거리 이상 떨어진 다음 경로 지점을 바라봅니다.
  look-ahead-distance: 2.0

  # ItemDisplay 크기입니다.
  scale: 0.85

  # 아이템을 XZ 평면에 눕히는 X축 회전값입니다. 서 있으면 90 또는 -90으로 조절하세요.
  pitch-offset: 90.0

  # 아이템 모델의 앞 방향이 어긋나면 90, 180, -90 등으로 보정합니다.
  yaw-offset: 0.0

  # 클라이언트 표시 범위입니다.
  view-range: 16.0

  # 아이템에 발광 효과를 줄지 설정합니다.
  glowing: false

database:
  # 저장 방식: sqlite
  type: sqlite

  sqlite:
    # plugins/AddNavigation/navigation.db 로 저장됩니다.
    file: navigation.db

